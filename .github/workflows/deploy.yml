name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    # Review filter to skip builds for non-website changes
    paths-ignore:
      - 'legacy-portfolio/**'
      - '.academic-agent/**'
      - 'README.md'

permissions:
  contents: write

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build website
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build
          branch: gh-pages # The branch the action will deploy to.
          clean: true
